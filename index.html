<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="card">
        <h1 class="title">My Tasks</h1>
        <p class="subtitle" id="subtitle">0 görev kaldı</p>

        <div class="input-row">
          <input type="text" id="input" placeholder="Yeni görev ekle..." />
          <button id="add">+</button>
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">Tümü</button>
          <button class="filter-btn" data-filter="active">Aktif</button>
          <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>

        <ul class="task-list" id="task-list">
          <li class="empty-state" id="empty-state">Henüz görev yok 🎉</li>
        </ul>

        <div class="footer">
          <button id="reset">Tamamlananları Temizle</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/script.js"></script>
  </body>
</html>
